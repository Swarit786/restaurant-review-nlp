<svg width="680" height="620" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg">
<title>NLP pipeline architecture</title>
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .th { font-size: 13px; font-weight: 600; }
  .ts { font-size: 11px; font-weight: 400; fill: #8b949e; }
  .arr { stroke: #484f58; stroke-width: 1.2; fill: none; }
</style>
<defs>
  <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#484f58" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<rect width="680" height="620" rx="8" fill="#0d1117"/>

<!-- Raw data -->
<rect x="210" y="24" width="260" height="50" rx="8" fill="#161b22" stroke="#30363d" stroke-width="0.8"/>
<text class="th" x="340" y="44" text-anchor="middle" fill="#c9d1d9">Raw data</text>
<text class="ts" x="340" y="62" text-anchor="middle">1M+ reviews · all categories</text>
<line x1="340" y1="74" x2="340" y2="106" class="arr" marker-end="url(#a)"/>

<!-- Data filtering -->
<rect x="180" y="108" width="320" height="50" rx="8" fill="#1c1437" stroke="#a5aaff" stroke-width="0.8"/>
<text class="th" x="340" y="128" text-anchor="middle" fill="#a5aaff">Data filtering &amp; cleaning</text>
<text class="ts" x="340" y="146" text-anchor="middle">212,119 restaurant reviews · 1,480 businesses · Alaska</text>

<!-- Split -->
<line x1="260" y1="158" x2="160" y2="208" class="arr" marker-end="url(#a)"/>
<line x1="420" y1="158" x2="520" y2="208" class="arr" marker-end="url(#a)"/>

<!-- Sentiment track label -->
<text class="ts" x="160" y="200" text-anchor="middle" fill="#3fb950" font-size="10">TRACK A</text>
<!-- Topic track label -->
<text class="ts" x="520" y="200" text-anchor="middle" fill="#f0997b" font-size="10">TRACK B</text>

<!-- LEFT: Sentiment analysis -->
<rect x="55" y="210" width="210" height="50" rx="8" fill="#0d2018" stroke="#3fb950" stroke-width="0.8"/>
<text class="th" x="160" y="230" text-anchor="middle" fill="#3fb950">Sentiment analysis</text>
<text class="ts" x="160" y="248" text-anchor="middle">DistilBERT · SST-2 fine-tuned</text>
<line x1="160" y1="260" x2="160" y2="308" class="arr" marker-end="url(#a)"/>

<!-- LEFT: Output -->
<rect x="55" y="310" width="210" height="50" rx="8" fill="#0d2018" stroke="#3fb950" stroke-width="0.8"/>
<text class="th" x="160" y="330" text-anchor="middle" fill="#3fb950">POSITIVE / NEGATIVE</text>
<text class="ts" x="160" y="348" text-anchor="middle">per review · 256 token max</text>

<!-- RIGHT: Embeddings -->
<rect x="415" y="210" width="210" height="50" rx="8" fill="#231510" stroke="#f0997b" stroke-width="0.8"/>
<text class="th" x="520" y="230" text-anchor="middle" fill="#f0997b">Sentence embeddings</text>
<text class="ts" x="520" y="248" text-anchor="middle">all-MiniLM-L6-v2 · 384-dim</text>
<line x1="520" y1="260" x2="520" y2="308" class="arr" marker-end="url(#a)"/>

<!-- RIGHT: UMAP -->
<rect x="415" y="310" width="210" height="50" rx="8" fill="#231510" stroke="#f0997b" stroke-width="0.8"/>
<text class="th" x="520" y="330" text-anchor="middle" fill="#f0997b">UMAP reduction</text>
<text class="ts" x="520" y="348" text-anchor="middle">384 → 5 dimensions</text>
<line x1="520" y1="360" x2="520" y2="398" class="arr" marker-end="url(#a)"/>

<!-- RIGHT: HDBSCAN -->
<rect x="415" y="400" width="210" height="50" rx="8" fill="#231510" stroke="#f0997b" stroke-width="0.8"/>
<text class="th" x="520" y="420" text-anchor="middle" fill="#f0997b">HDBSCAN clustering</text>
<text class="ts" x="520" y="438" text-anchor="middle">140 topics · min_size = 200</text>

<!-- Merge lines -->
<polyline points="160,360 160,510 338,510" class="arr"/>
<polyline points="520,450 520,510 342,510" class="arr"/>
<line x1="340" y1="510" x2="340" y2="530" class="arr" marker-end="url(#a)"/>

<!-- Output -->
<rect x="140" y="532" width="400" height="56" rx="8" fill="#1c1437" stroke="#a5aaff" stroke-width="0.8"/>
<text class="th" x="340" y="554" text-anchor="middle" fill="#a5aaff">Topic-level sentiment profiling</text>
<text class="ts" x="340" y="574" text-anchor="middle">5 CSV outputs · stratified examples · reproducible</text>
</svg>
